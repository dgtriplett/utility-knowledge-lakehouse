name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: YAML syntax check
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path
          import yaml

          failed = False
          for f in list(Path(".").rglob("*.yml")) + list(Path(".").rglob("*.yaml")):
              if ".venv" in str(f) or "node_modules" in str(f):
                  continue
              try:
                  yaml.safe_load(f.read_text())
                  print(f"OK  {f}")
              except Exception as e:
                  print(f"FAIL {f}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

      - name: Python syntax check
        run: |
          python - <<'EOF'
          import ast, sys
          from pathlib import Path

          failed = False
          for f in list(Path("src").rglob("*.py")) + list(Path("tests").rglob("*.py")):
              try:
                  ast.parse(f.read_text())
                  print(f"OK  {f}")
              except SyntaxError as e:
                  print(f"FAIL {f}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF

  bundle-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Validate bundle schema (no workspace call)
        # `bundle schema` outputs the JSON schema without needing a workspace
        # connection. A passing `schema` command is a strong signal that the
        # bundle YAML is well-formed. A full `bundle validate` would require
        # live workspace credentials.
        run: databricks bundle schema > /tmp/bundle-schema.json

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install reportlab pytest
      - run: pytest tests/

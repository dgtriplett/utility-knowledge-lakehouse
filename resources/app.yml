resources:
  apps:
    utility_knowledge_assistant:
      name: ${var.app_name}
      description: Conversational utility knowledge assistant with citations.
      source_code_path: ../src/app
      resources:
        - name: agent_endpoint
          description: Model Serving endpoint that hosts the agent.
          serving_endpoint:
            name: agents_${var.catalog}-${var.agents_schema}-utility_assistant
            permission: CAN_QUERY

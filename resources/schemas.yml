resources:
  schemas:
    raw:
      catalog_name: ${var.catalog}
      name: ${var.raw_schema}
      comment: Raw landed data from every source. Schema enforced on read.
    curated:
      catalog_name: ${var.catalog}
      name: ${var.curated_schema}
      comment: Governed, deduped, citation-preserving tables served to consumers.
    agents:
      catalog_name: ${var.catalog}
      name: ${var.agents_schema}
      comment: Registered agents and evaluation artifacts.

  volumes:
    raw_documents:
      catalog_name: ${var.catalog}
      schema_name: ${var.raw_schema}
      name: raw_documents
      volume_type: MANAGED
      comment: Scanned PDFs, as-builts, studies, and other source-of-truth files.
    raw_audio:
      catalog_name: ${var.catalog}
      schema_name: ${var.raw_schema}
      name: raw_audio
      volume_type: MANAGED
      comment: SME debrief audio recordings prior to transcription.
    checkpoints:
      catalog_name: ${var.catalog}
      schema_name: ${var.raw_schema}
      name: checkpoints
      volume_type: MANAGED
      comment: Structured streaming checkpoints for consolidation jobs.
